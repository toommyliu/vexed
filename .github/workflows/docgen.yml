name: Generate Documentation

on:
  push:
    branches: [main]
    paths:
      - 'app/src/renderer/game/scripting/Commands/**/*.ts'
      - 'app/src/renderer/game/scripting/Types.ts'
      - 'scripts/docgen.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.8.0'

      - name: Install dependencies
        run: pnpm install

      - name: Generate documentation
        run: pnpm run docgen

      - name: Commit and push documentation updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update API documentation"
            git push
          else
            echo "No documentation changes to commit"
          fi
